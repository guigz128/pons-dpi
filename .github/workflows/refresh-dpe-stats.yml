name: Rafraîchir les statistiques DPE (ADEME)

# Régénère le snapshot statique des stats DPE par commune (src/content/villes-dpe-stats.js)
# à partir de l'open data ADEME, et commit le fichier s'il a changé.
# Le push sur main déclenche le redéploiement Vercel (descriptions SEO mises à jour).

on:
  schedule:
    # Le 1er de chaque mois à 04:12 UTC (heure creuse, évite minuit pile)
    - cron: '12 4 1 * *'
  workflow_dispatch: # déclenchement manuel depuis l'onglet Actions

# Empêche deux exécutions simultanées
concurrency:
  group: refresh-dpe-stats
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Régénérer le snapshot DPE
        run: npm run build:dpe-stats

      - name: Commit si modifié
        run: |
          if git diff --quiet -- src/content/villes-dpe-stats.js; then
            echo "Aucun changement dans les statistiques DPE — rien à commiter."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/villes-dpe-stats.js
          git commit -m "chore(dpe): rafraîchissement mensuel des statistiques DPE (ADEME)"
          git push
